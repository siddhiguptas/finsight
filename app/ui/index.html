<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinSight News - Quick UI</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #132238;
      --muted: #5f6f85;
      --primary: #0b7285;
      --primary-strong: #0a5f70;
      --line: #d8e0ea;
      --good: #2f9e44;
      --bad: #e03131;
      --shadow: 0 10px 25px rgba(13, 36, 61, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 5% 0%, #d7f2f7 0%, transparent 32%),
                  radial-gradient(circle at 100% 0%, #eef7ff 0%, transparent 40%),
                  var(--bg);
      min-height: 100vh;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 36px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    p {
      margin-top: 0;
      color: var(--muted);
    }

    .muted {
      color: var(--muted);
      margin-top: 0;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    label {
      font-size: 13px;
      color: var(--muted);
    }

    input, select, button {
      border: 1px solid var(--line);
      border-radius: 10px;
      height: 40px;
      padding: 0 10px;
      font-size: 14px;
    }

    input:focus, select:focus {
      outline: 2px solid var(--primary);
      border-color: var(--primary);
    }

    button {
      background: var(--primary);
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: var(--primary-strong);
    }

    button.secondary {
      background: #6c757d;
    }

    button.secondary:hover {
      background: #5a6268;
    }

    .card {
      background: var(--card);
      border: 1px solid #e6edf5;
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-top: 14px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      margin: 10px 0;
      min-height: 20px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #adb5bd;
    }

    .dot.ok { background: var(--good); }
    .dot.err { background: var(--bad); }

    .results {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .explanation {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .item {
      border: 1px solid #e8edf3;
      border-radius: 10px;
      padding: 12px;
    }

    .item h3 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .chip {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #edf6f8;
      color: #0b6170;
      border: 1px solid #d2eaef;
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>FinSight News Quick UI</h1>
    <p>Use this page to verify the live feed is returning fresh, ticker-focused news.</p>

    <div class="card">
      <div class="grid">
        <div class="field">
          <label for="tickers">Tickers (comma separated)</label>
          <input id="tickers" placeholder="AAPL,MSFT" />
        </div>

        <div class="field">
          <label for="companyNames">Company Names (optional)</label>
          <input id="companyNames" placeholder="Apple, Microsoft" />
        </div>

        <div class="field">
          <label for="market">Market</label>
          <input id="market" placeholder="US" />
        </div>

        <div class="field">
          <label for="timeWindow">Time Window (hours)</label>
          <input id="timeWindow" type="number" min="1" max="168" value="24" />
        </div>

        <div class="field">
          <label for="limit">Limit</label>
          <input id="limit" type="number" min="1" max="50" value="10" />
        </div>

        <div class="field">
          <label for="explanationDetail">Explanation Detail</label>
          <select id="explanationDetail">
            <option value="short">short</option>
            <option value="medium" selected>medium</option>
            <option value="detailed">detailed</option>
          </select>
        </div>

        <div class="field">
          <label for="sources">Sources (optional)</label>
          <input id="sources" placeholder="newsapi,yahoo_rss,google_news_rss" />
        </div>
      </div>

      <button id="loadBtn">Load Feed</button>
      <p class="muted" style="margin:8px 0 0;">
        Feed uses fast analysis to avoid Gemini rate limits. Click "Analyze" per item for full explanation.
      </p>
      <div class="status" id="status"><span class="dot"></span><span>Idle</span></div>

      <div class="results" id="results"></div>
    </div>

    <div class="card">
      <h2>Analyze Text</h2>
      <p class="muted">Run the analysis pipeline on a single title + content.</p>

      <div class="grid">
        <div class="field">
          <label for="anTitle">Title</label>
          <input id="anTitle" placeholder="Apple reports strong quarterly earnings" />
        </div>

        <div class="field">
          <label for="anTicker">Ticker (optional)</label>
          <input id="anTicker" placeholder="AAPL" />
        </div>

        <div class="field" style="grid-column: span 2;">
          <label for="anContent">Content</label>
          <input id="anContent" placeholder="Apple reported revenue growth and strong iPhone sales..." />
        </div>

        <div class="field">
          <label for="anDetail">Explanation Detail</label>
          <select id="anDetail">
            <option value="short">short</option>
            <option value="medium" selected>medium</option>
            <option value="detailed">detailed</option>
          </select>
        </div>
      </div>

      <button id="analyzeBtn">Analyze</button>
      <div class="status" id="anStatus"><span class="dot"></span><span>Idle</span></div>
      <div class="results" id="anResults"></div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");
    const loadBtn = document.getElementById("loadBtn");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const anStatusEl = document.getElementById("anStatus");
    const anResultsEl = document.getElementById("anResults");

    function setStatus(text, kind) {
      const dotClass = kind === "ok" ? "ok" : kind === "err" ? "err" : "";
      statusEl.innerHTML = `<span class="dot ${dotClass}"></span><span>${text}</span>`;
    }

    function fmtDate(iso) {
      if (!iso) return "Unknown date";
      const d = new Date(iso);
      return Number.isNaN(d.getTime()) ? iso : d.toLocaleString();
    }

    function escapeHtml(value) {
      const str = String(value ?? "");
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderExplanationHtml(text) {
      const safe = escapeHtml(text);
      return `<div class="explanation">${safe.replace(/\n/g, "<br/>")}</div>`;
    }

    function renderArticles(data) {
      const articles = data.articles || [];
      if (!articles.length) {
        resultsEl.innerHTML = "<div class='item'>No articles returned.</div>";
        return;
      }

      resultsEl.innerHTML = articles.map((a, idx) => {
        const chips = [];
        if (a.sentiment_label) chips.push(`<span class='chip'>${a.sentiment_label}</span>`);
        if (a.impact_level) chips.push(`<span class='chip'>Impact: ${a.impact_level}</span>`);
        if (Array.isArray(a.tickers)) a.tickers.forEach((t) => chips.push(`<span class='chip'>${t}</span>`));

        return `
          <div class="item">
            <h3>${a.title || "Untitled"}</h3>
            <div class="meta">${a.source_name || "Unknown source"} • ${fmtDate(a.published_at)}</div>
            <div>${a.summary || "No summary"}</div>
            <div class="chips">${chips.join("")}</div>
            <div style="margin-top:8px; display:flex; gap:8px; align-items:center;">
              <button class="secondary analyze-item-btn" data-idx="${idx}">Analyze</button>
              <span class="meta" id="anItemStatus-${idx}"></span>
            </div>
            <div class="item" style="margin-top:8px; display:none;" id="anItemResult-${idx}"></div>
          </div>
        `;
      }).join("");

      const buttons = resultsEl.querySelectorAll(".analyze-item-btn");
      buttons.forEach((btn) => {
        btn.addEventListener("click", async () => {
          const idx = Number(btn.dataset.idx);
          const article = articles[idx];
          const statusEl = document.getElementById(`anItemStatus-${idx}`);
          const resultEl = document.getElementById(`anItemResult-${idx}`);
          if (!article) return;

          const detail = document.getElementById("explanationDetail").value;
          const title = article.title || "";
          const content = article.summary || article.title || "";
          const ticker = Array.isArray(article.tickers) && article.tickers.length ? article.tickers[0] : "";

          if (!title || !content) {
            statusEl.textContent = "Missing title/content.";
            return;
          }

          const analyzeMode = "full";
          statusEl.textContent = "Analyzing (full)...";
          resultEl.style.display = "none";
          resultEl.innerHTML = "";

          try {
            const res = await fetch("/api/v1/news/analyze", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                title,
                content,
                ticker: ticker || undefined,
                  analysis_mode: analyzeMode,
                  explanation_detail: detail,
                  explanation_format: "paragraph"
                })
              });
            const data = await res.json();
            if (!res.ok) {
              statusEl.textContent = `Error ${res.status}`;
              return;
            }

            const lines = [];
            lines.push(`<div class='meta'>Sentiment: ${data.sentiment_label ?? "n/a"} (${data.sentiment_score ?? "n/a"})</div>`);
            lines.push(`<div class='meta'>Impact: ${data.impact_level ?? "n/a"} (${data.impact_score ?? "n/a"})</div>`);
            if (data.ai_explanation) {
              lines.push(renderExplanationHtml(data.ai_explanation));
            } else {
              lines.push("<div>No explanation returned.</div>");
            }
            if (data.ai_explanation_is_fallback !== undefined && data.ai_explanation_is_fallback !== null) {
              lines.push(`<div class='meta'>Fallback: ${data.ai_explanation_is_fallback}</div>`);
            }

            resultEl.innerHTML = lines.join("");
            resultEl.style.display = "block";
            statusEl.textContent = "Done.";
          } catch (err) {
            statusEl.textContent = `Network error: ${err.message}`;
          }
        });
      });
    }

    async function loadFeed() {
      const tickersRaw = document.getElementById("tickers").value.trim();
      const companyNamesRaw = document.getElementById("companyNames").value.trim();
      const market = document.getElementById("market").value.trim();
      const limit = document.getElementById("limit").value || "10";
      const timeWindow = document.getElementById("timeWindow").value || "24";
      const explanationDetail = document.getElementById("explanationDetail").value;
      const sourcesRaw = document.getElementById("sources").value.trim();

      const tickers = tickersRaw.split(",").map(t => t.trim()).filter(Boolean);
      const companyNames = companyNamesRaw
        ? companyNamesRaw.split(",").map(n => n.trim()).filter(Boolean)
        : [];
      const sources = sourcesRaw ? sourcesRaw.split(",").map(s => s.trim()).filter(Boolean) : [];

      const payload = {
        tickers,
        company_names: companyNames.length ? companyNames : undefined,
        market: market || undefined,
        time_window_hours: Number(timeWindow),
        limit: Number(limit),
        analysis_mode: "fast",
        explanation_detail: explanationDetail,
        explanation_format: "paragraph",
        sources: sources.length ? sources : undefined
      };

      const url = `/api/v1/news/feed`;
      setStatus("Loading...", "");
      resultsEl.innerHTML = "";

      try {
        const headers = {
          "Content-Type": "application/json"
        };
        const res = await fetch(url, { method: "POST", headers, body: JSON.stringify(payload) });
        const data = await res.json();

        if (!res.ok) {
          setStatus(`Error ${res.status}: ${data.detail || "Request failed"}`, "err");
          resultsEl.innerHTML = "";
          return;
        }

        setStatus(`Success. Articles: ${data.count ?? 0}`, "ok");
        renderArticles(data);
      } catch (err) {
        setStatus(`Network error: ${err.message}`, "err");
      }
    }

    loadBtn.addEventListener("click", loadFeed);

    function setAnalyzeStatus(text, kind) {
      const dotClass = kind === "ok" ? "ok" : kind === "err" ? "err" : "";
      anStatusEl.innerHTML = `<span class="dot ${dotClass}"></span><span>${text}</span>`;
    }

    function renderAnalyzeResult(data) {
      if (!data) {
        anResultsEl.innerHTML = "<div class='item'>No response.</div>";
        return;
      }
      const lines = [];
      lines.push(`<div class='meta'>Sentiment: ${data.sentiment_label ?? "n/a"} (${data.sentiment_score ?? "n/a"})</div>`);
      lines.push(`<div class='meta'>Impact: ${data.impact_level ?? "n/a"} (${data.impact_score ?? "n/a"})</div>`);
      if (data.ai_explanation) {
        lines.push(renderExplanationHtml(data.ai_explanation));
      } else {
        lines.push("<div>No explanation returned.</div>");
      }
      if (data.ai_explanation_is_fallback !== undefined && data.ai_explanation_is_fallback !== null) {
        lines.push(`<div class='meta'>Fallback: ${data.ai_explanation_is_fallback}</div>`);
      }
      anResultsEl.innerHTML = `<div class='item'>${lines.join("")}</div>`;
    }

    async function analyzeText() {
      const title = document.getElementById("anTitle").value.trim();
      const content = document.getElementById("anContent").value.trim();
      const ticker = document.getElementById("anTicker").value.trim();
      const detail = document.getElementById("anDetail").value;

      if (!title || !content) {
        setAnalyzeStatus("Title and content required.", "err");
        return;
      }

      const payload = {
        title,
        content,
        ticker: ticker || undefined,
        analysis_mode: "full",
        explanation_detail: detail,
        explanation_format: "paragraph"
      };

      setAnalyzeStatus("Analyzing...", "");
      anResultsEl.innerHTML = "";

      try {
        const res = await fetch("/api/v1/news/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
          setAnalyzeStatus(`Error ${res.status}: ${data.detail || "Request failed"}`, "err");
          return;
        }
        setAnalyzeStatus("Success.", "ok");
        renderAnalyzeResult(data);
      } catch (err) {
        setAnalyzeStatus(`Network error: ${err.message}`, "err");
      }
    }

    analyzeBtn.addEventListener("click", analyzeText);
    (async () => {
      try {
        const res = await fetch("/health");
        if (res.ok) {
          setStatus("API reachable. Ready.", "ok");
        } else {
          setStatus("API not healthy.", "err");
        }
      } catch (err) {
        setStatus("API not reachable.", "err");
      }
    })();
  </script>
</body>
</html>
